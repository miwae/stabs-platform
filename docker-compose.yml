version: '3.8'
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stabs-postgres
    environment:
      POSTGRES_DB: stabs_db
      POSTGRES_USER: stabs_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - stabs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stabs_user -d stabs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: stabs-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://stabs_user:${DB_PASSWORD}@postgres:5432/stabs_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - stabs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: stabs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stabs-network
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:

networks:
  stabs-network:
    driver: bridge
