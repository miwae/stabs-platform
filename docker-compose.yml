services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stabs-platform-postgres
    environment:
      POSTGRES_USER: stabs_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StabsSecure2026!}
      POSTGRES_DB: stabs_db
    volumes:
      - stabs_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stabs_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stabs-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - stabs_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: stabs-platform-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://stabs_user:${DB_PASSWORD:-StabsSecure2026!}@postgres:5432/stabs_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-StabsJWT2026Secret!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stabs_postgres_data:
  stabs_redis_data:

networks:
  default:
    name: stabs-network
